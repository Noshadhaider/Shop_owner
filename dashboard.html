<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700&display=swap');

:root{
  --cream:#FBF4E6; --ink:#2B2118; --terracotta:#C1582B;
  --terracotta-dark:#9E4521; --leaf:#5B7A4F; --line:#E3D5BC;
  --card:#FFFDF8; --pending:#A33B3B; --making:#B98A2E; --done:#5B7A4F;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Manrope',sans-serif;min-height:100vh;}

header{padding:24px 20px 18px;background:var(--ink);color:var(--cream);display:flex;justify-content:space-between;}
.dash-title{font-family:'Fraunces',serif;font-weight:700;font-size:22px;}
.logout-btn{border:1px solid #6B5C48;background:none;color:white;padding:7px 12px;border-radius:8px;cursor:pointer;}

.tab-row{display:flex;gap:6px;padding:14px;}
.tab-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--line);cursor:pointer;}
.tab-btn.active{background:var(--ink);color:white;}

.tab-page{display:none;}
.tab-page.active{display:block;}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;}
.stat-box{background:var(--card);border:1px solid var(--line);padding:12px;text-align:center;border-radius:10px;}
.stat-num{font-size:22px;font-weight:700;color:var(--terracotta-dark);}

.order-card{background:white;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;}
.status-pill{padding:4px 10px;border-radius:20px;color:white;font-size:11px;}

.status-pending{background:var(--pending);}
.status-new{background:var(--terracotta);}
.status-making{background:var(--making);}
.status-done{background:var(--done);}

.action-btn{padding:8px;border:1px solid var(--line);border-radius:8px;cursor:pointer;}

.product-card{background:white;padding:12px;border-radius:12px;margin-bottom:10px;border:1px solid var(--line);}
.product-actions button{margin-right:5px;}

.form-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;}
.form-overlay.show{display:flex;align-items:flex-end;}
.form-sheet{background:white;width:100%;padding:20px;border-radius:20px 20px 0 0;}

.qr-card{background:white;border:1px solid var(--line);padding:10px;border-radius:10px;margin:10px;}
</style>
</head>

<body>

<div id="mainApp">

<header>
  <div>
    <div class="dash-title" id="shopNameDisplay">Owner Dashboard</div>
    <div style="font-size:12px;">Live Orders</div>
  </div>
  <button class="logout-btn" onclick="handleLogout()">Logout</button>
</header>

<div class="tab-row">
  <button class="tab-btn active" onclick="switchTab('orders')">Orders</button>
  <button class="tab-btn" onclick="switchTab('menu')">Menu</button>
  <button class="tab-btn" onclick="switchTab('qr')">QR</button>
</div>

<!-- ORDERS -->
<div class="tab-page active" id="pageOrders">
  <div class="stats-row">
    <div class="stat-box"><div id="statPending">0</div><div>Pending</div></div>
    <div class="stat-box"><div id="statQueue">0</div><div>Queue</div></div>
  </div>

  <div id="ordersList"></div>
</div>

<!-- MENU -->
<div class="tab-page" id="pageMenu">
  <button onclick="openProductForm()">+ Add Product</button>
  <div id="productList"></div>
</div>

<!-- QR -->
<div class="tab-page" id="pageQr">
  <input id="tableCountInput" type="number" value="6">
  <button onclick="generateAllQrCodes()">Generate QR</button>
  <div id="qrCodesArea"></div>
</div>

<!-- FORM -->
<div class="form-overlay" id="formOverlay">
  <div class="form-sheet" id="formSheetContent"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB2_c5iNacAvOSryCkfE1Th2tAwFoy9bmw",
  authDomain: "shopowner-54b53.firebaseapp.com",
  projectId: "shopowner-54b53",
  storageBucket: "shopowner-54b53.firebasestorage.app",
  messagingSenderId: "370357744472",
  appId: "1:370357744472:web:a50a84bf3ab8a7d262ab2d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentShopId=null;
let products=[];

auth.onAuthStateChanged(async user=>{
  if(!user){window.location.href="login.html";return;}

  const userDoc=await db.collection("users").doc(user.uid).get();
  currentShopId=userDoc.data().shopId;

  const shop=await db.collection("shops").doc(currentShopId).get();
  document.getElementById("shopNameDisplay").innerText=shop.data().shopName;

  listenOrders();
  loadProducts();
});

// ===== ORDERS =====
function listenOrders(){
  db.collection("shops").doc(currentShopId).collection("orders")
  .onSnapshot(snap=>{
    const orders=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderOrders(orders);
  });
}

function renderOrders(orders){
  let html="";
  let pending=0,queue=0;

  orders.forEach(o=>{
    if(o.status==="pending") pending++;
    if(o.status==="new"||o.status==="making") queue++;

    html+=`
    <div class="order-card">
      <b>#${o.shortCode||o.id.slice(-4)}</b>
      <div>${o.name||"Guest"}</div>
      <span class="status-pill status-${o.status}">${o.status}</span>
      <div>
        <button onclick="setStatus('${o.id}','making')">Making</button>
        <button onclick="setStatus('${o.id}','done')">Done</button>
      </div>
    </div>`;
  });

  document.getElementById("ordersList").innerHTML=html;
  document.getElementById("statPending").innerText=pending;
  document.getElementById("statQueue").innerText=queue;
}

function setStatus(id,status){
  db.collection("shops").doc(currentShopId).collection("orders").doc(id).update({status});
}

// ===== PRODUCTS =====
async function loadProducts(){
  const snap=await db.collection("shops").doc(currentShopId).collection("products").get();
  products=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderProducts();
}

function renderProducts(){
  document.getElementById("productList").innerHTML=
  products.map(p=>`
  <div class="product-card">
    <b>${p.name}</b>
    <div>Rs ${p.price}</div>
    <button onclick="deleteProduct('${p.id}')">Delete</button>
  </div>`).join("");
}

function openProductForm(editId){
  const p=products.find(x=>x.id===editId)||{};
  document.getElementById("formSheetContent").innerHTML=`
    <h3>Product</h3>
    <input id="name" placeholder="Name" value="${p.name||''}">
    <input id="price" placeholder="Price" value="${p.price||''}">
    <button onclick="saveProduct('${editId||''}')">Save</button>
  `;
  document.getElementById("formOverlay").classList.add("show");
}

async function saveProduct(editId){
  const data={
    name:document.getElementById("name").value,
    price:parseFloat(document.getElementById("price").value)||0
  };

  if(!data.name) return alert("Name required");

  const ref=db.collection("shops").doc(currentShopId).collection("products");

  if(editId) await ref.doc(editId).update(data);
  else await ref.add(data);

  closeForm();
  loadProducts();
}

function closeForm(){
  document.getElementById("formOverlay").classList.remove("show");
}

async function deleteProduct(id){
  await db.collection("shops").doc(currentShopId).collection("products").doc(id).delete();
  loadProducts();
}

// ===== QR =====
function generateAllQrCodes(){
  const count=document.getElementById("tableCountInput").value;
  const area=document.getElementById("qrCodesArea");
  area.innerHTML="";

  for(let i=1;i<=count;i++){
    const div=document.createElement("div");
    new QRCode(div,{
      text:`${location.origin}/customer.html?shop=${currentShopId}&table=${i}`,
      width:120,
      height:120
    });

    const wrap=document.createElement("div");
    wrap.className="qr-card";
    wrap.innerHTML=`<b>Table ${i}</b>`;
    wrap.prepend(div);

    area.appendChild(wrap);
  }
}

// ===== TABS =====
function switchTab(tab){
  ["orders","menu","qr"].forEach(t=>{
    document.getElementById("page"+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove("active");
  });
  document.getElementById("page"+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add("active");
}

function handleLogout(){
  auth.signOut().then(()=>window.location.href="login.html");
}
</script>

</body>
</html>
